version: 1
description: Approved business metrics for the Ask Data architecture.
rules:
- Use only metrics defined in this file.
- Do not change a metric formula without updating this file.
- Use the date field assigned to the metric.
- Do not mix metrics with incompatible grains without an approved aggregation rule.
- Apply required filters and exclusions exactly as documented.
- Handle division by zero safely.
- Report data-quality warnings when required source values are missing.
- Use canonical dimension values from the semantic layer.
metrics:
  won_revenue:
    label: Won Revenue
    business_definition: Total sales revenue generated from opportunities that were
      successfully won.
    source:
      table: sales_pipeline
      value_field: close_value
      status_field: deal_stage
      date_field: close_date
    calculation_sql: SUM(CASE WHEN deal_stage = 'Won' THEN close_value ELSE 0 END)
    required_filters:
    - deal_stage = 'Won'
    allowed_dimensions:
    - product
    - account
    - sales_agent
    - manager
    - regional_office
    - close_month
    - close_quarter
    - close_year
    default_grain: one row per requested reporting dimension
    exclusions:
    - Prospecting
    - Engaging
    - Lost
    null_handling:
      close_value: Ignore null values.
      warning: Report won opportunities with null close_value as a data-quality warning.
    notes: Do not confuse this metric with accounts.revenue, which represents customer
      annual revenue.
  won_opportunities:
    label: Won Opportunities
    business_definition: Number of opportunities that reached the Won stage.
    source:
      table: sales_pipeline
      identifier: opportunity_id
      status_field: deal_stage
      date_field: close_date
    calculation_sql: COUNT(CASE WHEN deal_stage = 'Won' THEN opportunity_id END)
    required_filters:
    - deal_stage = 'Won'
    allowed_dimensions:
    - product
    - account
    - sales_agent
    - manager
    - regional_office
    - close_month
    - close_quarter
    - close_year
    null_handling:
      opportunity_id: Exclude null identifiers.
  lost_opportunities:
    label: Lost Opportunities
    business_definition: Number of opportunities that reached the Lost stage.
    source:
      table: sales_pipeline
      identifier: opportunity_id
      status_field: deal_stage
      date_field: close_date
    calculation_sql: COUNT(CASE WHEN deal_stage = 'Lost' THEN opportunity_id END)
    required_filters:
    - deal_stage = 'Lost'
    allowed_dimensions:
    - product
    - account
    - sales_agent
    - manager
    - regional_office
    - close_month
    - close_quarter
    - close_year
  closed_opportunities:
    label: Closed Opportunities
    business_definition: Number of opportunities that reached a final outcome.
    source:
      table: sales_pipeline
      identifier: opportunity_id
      status_field: deal_stage
      date_field: close_date
    calculation_sql: COUNT(CASE WHEN deal_stage IN ('Won', 'Lost') THEN opportunity_id
      END)
    included_stages:
    - Won
    - Lost
    excluded_stages:
    - Prospecting
    - Engaging
  win_rate:
    label: Win Rate
    business_definition: Percentage of closed opportunities that were won.
    source:
      table: sales_pipeline
      identifier: opportunity_id
      status_field: deal_stage
      date_field: close_date
    formula: won_opportunities / closed_opportunities
    calculation_sql: 100.0 * COUNT(CASE WHEN deal_stage = 'Won' THEN opportunity_id
      END) / NULLIF(COUNT(CASE WHEN deal_stage IN ('Won', 'Lost') THEN opportunity_id
      END), 0)
    included_stages:
    - Won
    - Lost
    excluded_stages:
    - Prospecting
    - Engaging
    allowed_dimensions:
    - product
    - account
    - sales_agent
    - manager
    - regional_office
    - close_month
    - close_quarter
    - close_year
    zero_handling: Return null when there are no closed opportunities.
  average_won_deal_size:
    label: Average Won Deal Size
    business_definition: Average value of won opportunities.
    source:
      table: sales_pipeline
      value_field: close_value
      status_field: deal_stage
      date_field: close_date
    calculation_sql: AVG(CASE WHEN deal_stage = 'Won' THEN close_value END)
    required_filters:
    - deal_stage = 'Won'
    null_handling:
      close_value: Ignore null values.
  open_opportunities:
    label: Open Opportunities
    business_definition: Number of opportunities that have not yet reached a final
      outcome.
    source:
      table: sales_pipeline
      identifier: opportunity_id
      status_field: deal_stage
      date_field: engage_date
    calculation_sql: COUNT(CASE WHEN deal_stage IN ('Prospecting', 'Engaging') THEN
      opportunity_id END)
    included_stages:
    - Prospecting
    - Engaging
    excluded_stages:
    - Won
    - Lost
  open_pipeline_value:
    label: Open Pipeline Value
    business_definition: Estimated value of open opportunities based on product sales
      price.
    source:
      fact_table: sales_pipeline
      dimension_table: products
      value_field: sales_price
      status_field: deal_stage
      date_field: engage_date
    calculation_sql: SUM(CASE WHEN deal_stage IN ('Prospecting', 'Engaging') THEN
      sales_price ELSE 0 END)
    required_join:
      left_table: sales_pipeline
      right_table: products
      condition: sales_pipeline.product = products.product
      note: Apply canonical product mappings from the semantic layer before joining.
    included_stages:
    - Prospecting
    - Engaging
    notes: This is an estimated pipeline value and is not equivalent to won revenue.
  customer_annual_revenue:
    label: Customer Annual Revenue
    business_definition: The annual company revenue of a customer account.
    source:
      table: accounts
      value_field: revenue
    calculation_sql: SUM(revenue)
    grain: one row per account
    allowed_dimensions:
    - account
    - sector
    - office_location
    - subsidiary_parent
    clarification_rule: When the user asks only for revenue, distinguish between won
      revenue and customer annual revenue.
initial_business_question:
  question: Which products generated the highest won revenue during the latest completed
    year, and how did their win rates compare?
  required_metrics:
  - won_revenue
  - won_opportunities
  - lost_opportunities
  - win_rate
  required_dimension: product
  required_grain: one row per product
  required_timeframe: latest completed calendar year available in close_date
  required_ranking:
    field: won_revenue
    direction: descending
  required_output_columns:
  - product
  - won_revenue
  - won_opportunities
  - lost_opportunities
  - win_rate
  required_exclusions:
  - Exclude open opportunities from the win-rate denominator.
  - Exclude lost opportunities from won revenue.
  - Exclude null close_value values from revenue aggregation.
  - Apply canonical product-name mappings before grouping or joining.
